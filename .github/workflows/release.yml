name: Build & Release DMG

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: HotkeyLauncher
  BUNDLE_ID: com.zjy.hotkeylauncher
  MIN_SYSTEM_VERSION: "12.0"

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Assemble .app bundle
        run: |
          set -euo pipefail

          DIST_DIR="dist"
          APP_BUNDLE="$DIST_DIR/$APP_NAME.app"
          APP_CONTENTS="$APP_BUNDLE/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"
          APP_RESOURCES="$APP_CONTENTS/Resources"
          APP_BINARY="$APP_MACOS/$APP_NAME"
          INFO_PLIST="$APP_CONTENTS/Info.plist"

          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.${GITHUB_RUN_NUMBER}"
          fi
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          BUILD_BINARY="$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/$APP_NAME"

          test -x "$BUILD_BINARY"

          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_MACOS" "$APP_RESOURCES"
          cp "$BUILD_BINARY" "$APP_BINARY"
          cp "HotkeyLauncher.icns" "$APP_RESOURCES/HotkeyLauncher.icns"
          chmod +x "$APP_BINARY"

          cat >"$INFO_PLIST" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>$APP_NAME</string>
            <key>CFBundleIdentifier</key>
            <string>$BUNDLE_ID</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>$APP_NAME</string>
            <key>CFBundleDisplayName</key>
            <string>Hotkey Launcher</string>
            <key>CFBundleIconFile</key>
            <string>HotkeyLauncher</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>$VERSION</string>
            <key>CFBundleVersion</key>
            <string>$BUILD_NUMBER</string>
            <key>LSMinimumSystemVersion</key>
            <string>$MIN_SYSTEM_VERSION</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          PLIST

          plutil -lint "$INFO_PLIST"
          codesign --force --deep --sign - "$APP_BUNDLE"

          echo "APP_BUNDLE=$APP_BUNDLE" >>"$GITHUB_ENV"
          echo "VERSION=$VERSION" >>"$GITHUB_ENV"

      - name: Verify macOS 12 deployment target
        run: |
          set -euo pipefail

          PLIST_MIN_SYSTEM_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' "$APP_BUNDLE/Contents/Info.plist")"
          test "$PLIST_MIN_SYSTEM_VERSION" = "$MIN_SYSTEM_VERSION"

          lipo -info "$APP_BUNDLE/Contents/MacOS/$APP_NAME"
          otool -l "$APP_BUNDLE/Contents/MacOS/$APP_NAME" | awk '/LC_BUILD_VERSION/{printing=1} printing{print} /sdk/{printing=0}'
          otool -l "$APP_BUNDLE/Contents/MacOS/$APP_NAME" | grep -q "minos $MIN_SYSTEM_VERSION"

      - name: Create DMG
        run: |
          set -euo pipefail

          DMG_NAME="$APP_NAME-$VERSION.dmg"
          DMG_ROOT="dist/dmg-root"

          rm -rf "$DMG_ROOT" "$DMG_NAME"
          mkdir -p "$DMG_ROOT"
          cp -R "$APP_BUNDLE" "$DMG_ROOT/$APP_NAME.app"
          ln -s /Applications "$DMG_ROOT/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_ROOT" \
            -ov \
            -format UDZO \
            "$DMG_NAME"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: HotkeyLauncher-DMG
          path: HotkeyLauncher-*.dmg

      - name: Write update metadata
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail

          DMG_NAME="$APP_NAME-$VERSION.dmg"
          cat >latest.json <<JSON
          {
            "version": "$VERSION",
            "tagName": "$GITHUB_REF_NAME",
            "releaseURL": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}",
            "downloadURL": "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${DMG_NAME}",
            "publishedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          }
          JSON

      - name: Upload DMG to Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            HotkeyLauncher-*.dmg
            latest.json
