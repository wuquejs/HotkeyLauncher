name: Build & Release DMG

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release

      - name: Assemble .app bundle
        run: |
          APP_NAME="HotkeyLauncher"
          BUNDLE_ID="com.zjy.hotkeylauncher"
          DIST_DIR="dist"
          APP_BUNDLE="$DIST_DIR/$APP_NAME.app"
          APP_CONTENTS="$APP_BUNDLE/Contents"
          APP_MACOS="$APP_CONTENTS/MacOS"

          BUILD_BINARY="$(swift build -c release --show-bin-path)/$APP_NAME"

          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_MACOS"
          cp "$BUILD_BINARY" "$APP_MACOS/$APP_NAME"
          chmod +x "$APP_MACOS/$APP_NAME"

          cat >"$APP_CONTENTS/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>HotkeyLauncher</string>
            <key>CFBundleIdentifier</key>
            <string>com.zjy.hotkeylauncher</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>HotkeyLauncher</string>
            <key>CFBundleDisplayName</key>
            <string>Hotkey Launcher</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
          </dict>
          </plist>
          PLIST

          codesign --force --deep --sign - "$APP_BUNDLE" || true

      - name: Create DMG
        run: |
          APP_NAME="HotkeyLauncher"
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="${APP_NAME}-${VERSION}.dmg"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "dist/$APP_NAME.app" \
            -ov \
            -format UDZO \
            "$DMG_NAME"

      - name: Upload DMG to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
